<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Stackly EV Charging</title>
  <link rel="icon" type="image/webp" href="assets/top-logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --clr-primary: #1F6EFA;
      --clr-primary-hover: #1558D6;
      --clr-accent: #00D4FF;
      --clr-bg: #0d0e12;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--clr-bg);
      font-family: var(--font-body);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
      opacity: 0.6;
    }

    .glow-orb-1 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(31, 110, 250, 0.25) 0%, transparent 70%);
      top: -10%;
      left: 10%;
      animation: floatOrb 15s ease-in-out infinite alternate;
    }

    .glow-orb-2 {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.2) 0%, transparent 70%);
      bottom: -10%;
      right: 10%;
      animation: floatOrb 20s ease-in-out infinite alternate-reverse;
    }

    @keyframes floatOrb {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-30px) scale(1.1); }
    }

    
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      pointer-events: none;
    }

    
    .container-404 {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    
    .radar-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(0, 212, 255, 0.08);
      border-radius: 50%;
      animation: pulseRadar 4s linear infinite;
    }

    .radar-ring:nth-child(2) {
      animation-delay: 1.3s;
    }

    .radar-ring:nth-child(3) {
      animation-delay: 2.6s;
    }

    @keyframes pulseRadar {
      0% {
        transform: scale(0.6);
        opacity: 0;
        border-color: rgba(31, 110, 250, 0.1);
      }
      30% {
        opacity: 0.8;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
        border-color: rgba(0, 212, 255, 0.4);
      }
    }

    
    .error-code {
      font-family: var(--font-heading);
      font-size: 6.5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 30%, var(--clr-accent) 70%, var(--clr-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 15px;
      position: relative;
      z-index: 3;
      animation: floatText 4s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    
    .connector-icon {
      position: absolute;
      font-size: 2.2rem;
      color: var(--clr-accent);
      z-index: 4;
      animation: plugRotate 8s linear infinite;
    }

    @keyframes plugRotate {
      0% { transform: rotate(0deg) translateY(-95px) rotate(0deg); }
      100% { transform: rotate(360deg) translateY(-95px) rotate(-360deg); }
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.3s;
    }

    .error-desc {
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.5s;
    }

    
    .btn-group-404 {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      width: 100%;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.7s;
    }

    .btn-404 {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.9rem 1.8rem;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      flex: 1;
      max-width: 200px;
    }

    .btn-primary-404 {
      background: var(--clr-primary);
      color: #ffffff;
      border: 1px solid var(--clr-primary);
      box-shadow: 0 4px 15px rgba(31, 110, 250, 0.3);
    }

    .btn-primary-404:hover {
      background: var(--clr-primary-hover);
      border-color: var(--clr-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(31, 110, 250, 0.5);
    }

    .btn-secondary-404 {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    .btn-secondary-404:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-404 i {
      font-size: 0.9rem;
      transition: transform 0.2s ease;
    }

    .btn-404:hover i {
      transform: scale(1.1);
    }

    .btn-secondary-404:hover i {
      transform: translateX(-3px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 5.5rem;
      }
      .error-title {
        font-size: 1.8rem;
      }
      .btn-group-404 {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .btn-404 {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="grid-overlay"></div>

  <div class="container-404">
    
    <div class="radar-container">
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="connector-icon"><i class="fa-solid fa-plug"></i></div>
      <div class="error-code">404</div>
    </div>

    <h1 class="error-title">Connection Lost!</h1>
    <p class="error-desc">
      The EV charging route you've requested seems to be disconnected or hasn't been built yet. Let's redirect you to a functional charging station!
    </p>

    
    <div class="btn-group-404">
      <a href="index.html" class="btn-404 btn-primary-404">
        <i class="fa-solid fa-house"></i> Back to Home
      </a>
      <a href="javascript:history.back()" class="btn-404 btn-secondary-404">
        <i class="fa-solid fa-arrow-left"></i> Go Back
      </a>
    </div>
  </div>

</body>
</html>
